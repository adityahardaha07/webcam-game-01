<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Hand AR Demo</title>
<style>
  body { margin: 0; overflow: hidden; background: #000; }
  #container { position: relative; width: 100vw; height: 100vh; }
  video, canvas#three-canvas {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%; object-fit: cover;
  }
  video { transform: scaleX(-1); } /* mirror like a selfie cam */
  canvas#three-canvas { transform: scaleX(-1); pointer-events: none; }
</style>
</head>
<body>
<div id="container">
  <video id="video" autoplay playsinline></video>
  <canvas id="three-canvas"></canvas>
</div>

<!-- MediaPipe Hands -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<!-- Three.js -->
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>
// ---- THREE.JS SETUP ----
const canvas = document.getElementById('three-canvas');
const renderer = new THREE.WebGLRenderer({ canvas, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.z = 5;

// Light
scene.add(new THREE.AmbientLight(0xffffff, 0.6));
const dirLight = new THREE.DirectionalLight(0xffffff, 1);
dirLight.position.set(2, 2, 5);
scene.add(dirLight);

// The 3D shape (faceted "icosahedron" sphere, like in the video)
const geometry = new THREE.IcosahedronGeometry(1, 1);
const material = new THREE.MeshStandardMaterial({
  color: 0x3399ff,
  flatShading: true,
  metalness: 0.3,
  roughness: 0.4
});
const shape = new THREE.Mesh(geometry, material);
shape.visible = false; // hidden until a hand is detected
scene.add(shape);

window.addEventListener('resize', () => {
  renderer.setSize(window.innerWidth, window.innerHeight);
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
});

// ---- MEDIAPIPE HANDS SETUP ----
const videoElement = document.getElementById('video');

const hands = new Hands({
  locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
});
hands.setOptions({
  maxNumHands: 1,
  modelComplexity: 1,
  minDetectionConfidence: 0.6,
  minTrackingConfidence: 0.6
});

hands.onResults((results) => {
  if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
    const landmarks = results.multiHandLandmarks[0];

    // Use the palm center (landmark 9 = base of middle finger) as anchor
    const palm = landmarks[9];

    // Convert normalized (0-1) coords to Three.js world coords
    const x = (palm.x - 0.5) * 6;   // spread across screen width
    const y = -(palm.y - 0.5) * 10; // flip Y (image coords vs 3D coords)
    const z = -palm.z * 5;          // depth (rough estimate)

    shape.position.set(x, y, z);
    shape.visible = true;

    // Make it spin for a "live" effect
    shape.rotation.x += 0.01;
    shape.rotation.y += 0.02;
  } else {
    shape.visible = false;
  }
});

// ---- CAMERA FEED ----
const camFeed = new Camera(videoElement, {
  onFrame: async () => {
    await hands.send({ image: videoElement });
  },
  width: 640,
  height: 480
});
camFeed.start();

// ---- RENDER LOOP ----
function animate() {
  requestAnimationFrame(animate);
  renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>
